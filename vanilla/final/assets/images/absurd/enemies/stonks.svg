<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Stonks Meme (guy with arrow graph) -->
  <!-- Graph background -->
  <rect x="0" y="0" width="32" height="32" fill="#1a1a1a"/>

  <!-- Grid lines -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#333" stroke-width="0.5"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#333" stroke-width="0.5"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#333" stroke-width="0.5"/>

  <!-- STONKS! graph line (going up) -->
  <polyline points="2,28 8,24 12,20 18,12 24,8 30,4"
            fill="none" stroke="#00ff00" stroke-width="2"/>

  <!-- Arrow going UP -->
  <path d="M 28 6 L 30 4 L 32 6" fill="none" stroke="#00ff00" stroke-width="2"/>

  <!-- Meme man head (abstract) -->
  <ellipse cx="16" cy="18" rx="6" ry="7" fill="#f4c2a0" stroke="#000" stroke-width="0.5"/>

  <!-- Simple face -->
  <circle cx="14" cy="17" r="1" fill="black"/>
  <circle cx="18" cy="17" r="1" fill="black"/>
  <path d="M 14 20 Q 16 22, 18 20" fill="none" stroke="black" stroke-width="0.8"/>

  <!-- "STONKS" text -->
  <text x="16" y="30" font-family="Arial, sans-serif" font-size="6"
        fill="#00ff00" text-anchor="middle" font-weight="bold">STONKS</text>
</svg>
