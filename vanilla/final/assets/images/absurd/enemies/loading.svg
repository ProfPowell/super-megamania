<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Eternal Loading Spinner (never finishes) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#e2e8f0" stroke-width="3"/>

  <!-- Spinning arc -->
  <path d="M 16 4 A 12 12 0 0 1 28 16"
        fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 16 16" to="360 16 16" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Percentage text that never reaches 100% -->
  <text x="16" y="19" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="8" fill="#64748b" font-weight="bold">99%</text>

  <!-- Small dots indicating "still loading..." -->
  <circle cx="8" cy="26" r="1" fill="#64748b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="26" r="1" fill="#64748b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="26" r="1" fill="#64748b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
