<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Chili Pepper (HOT!) -->
  <!-- Main pepper body (red) -->
  <path d="M 18 8 Q 20 12, 18 18 Q 17 24, 14 28 Q 12 26, 11 22 Q 10 16, 12 12 Q 14 8, 18 8"
        fill="#dc143c" stroke="#8b0000" stroke-width="1"/>

  <!-- Highlight -->
  <ellipse cx="15" cy="14" rx="2" ry="3" fill="#ff6347" opacity="0.6"/>

  <!-- Stem (green) -->
  <path d="M 17 8 Q 18 6, 19 8" fill="none" stroke="#228b22" stroke-width="2" stroke-linecap="round"/>
  <path d="M 18 7 Q 20 5, 21 7" fill="none" stroke="#228b22" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Leaf -->
  <path d="M 19 7 L 22 6 Q 23 7, 21 8 Z" fill="#32cd32" stroke="#228b22" stroke-width="0.5"/>

  <!-- Flame particles (it's HOT!) -->
  <path d="M 8 14 Q 6 12, 8 10" fill="#ff4500" opacity="0.8">
    <animate attributeName="d"
             values="M 8 14 Q 6 12, 8 10; M 8 14 Q 5 11, 8 9; M 8 14 Q 6 12, 8 10"
             dur="0.3s" repeatCount="indefinite"/>
  </path>
  <path d="M 10 18 Q 7 16, 9 14" fill="#ff6347" opacity="0.7">
    <animate attributeName="d"
             values="M 10 18 Q 7 16, 9 14; M 10 18 Q 6 15, 9 13; M 10 18 Q 7 16, 9 14"
             dur="0.4s" repeatCount="indefinite"/>
  </path>

  <!-- Angry face -->
  <circle cx="14" cy="16" r="1.5" fill="black"/>
  <circle cx="16" cy="18" r="1.5" fill="black"/>
</svg>
