<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Martini Glass -->
  <!-- Glass cone -->
  <path d="M 6 6 L 16 22 L 26 6 Z" fill="none" stroke="#aaa" stroke-width="2"/>

  <!-- Liquid (green) -->
  <path d="M 8 8 L 16 20 L 24 8 Z" fill="#7fff00" opacity="0.6"/>

  <!-- Stem -->
  <line x1="16" y1="22" x2="16" y2="28" stroke="#aaa" stroke-width="2"/>

  <!-- Base -->
  <ellipse cx="16" cy="28" rx="6" ry="2" fill="#aaa"/>

  <!-- Olive on toothpick -->
  <line x1="14" y1="12" x2="18" y2="12" stroke="#8b4513" stroke-width="1"/>
  <circle cx="16" cy="12" r="2.5" fill="#6b8e23" stroke="#556b2f" stroke-width="0.5"/>
  <circle cx="16" cy="12" r="1" fill="red"/>

  <!-- Bubbles -->
  <circle cx="12" cy="14" r="1" fill="white" opacity="0.5"/>
  <circle cx="19" cy="16" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="14" cy="18" r="0.8" fill="white" opacity="0.6"/>

  <!-- Googly eyes on the olive -->
  <circle cx="15" cy="11.5" r="0.8" fill="white"/>
  <circle cx="17" cy="11.5" r="0.8" fill="white"/>
  <circle cx="15" cy="11.5" r="0.4" fill="black"/>
  <circle cx="17" cy="11.5" r="0.4" fill="black"/>
</svg>
