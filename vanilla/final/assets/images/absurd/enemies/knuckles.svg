<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- UGANDA KNUCKLES (Do you know da wae?) -->
  <!-- Body (red echidna) -->
  <ellipse cx="16" cy="18" rx="10" ry="8" fill="#ff0000" stroke="#cc0000" stroke-width="1"/>

  <!-- Spikes on back -->
  <path d="M 8 14 L 6 12 L 8 16" fill="#ff0000" stroke="#cc0000" stroke-width="0.5"/>
  <path d="M 10 12 L 8 10 L 10 14" fill="#ff0000" stroke="#cc0000" stroke-width="0.5"/>
  <path d="M 12 11 L 11 8 L 13 12" fill="#ff0000" stroke="#cc0000" stroke-width="0.5"/>

  <!-- Face/snout -->
  <ellipse cx="16" cy="16" rx="7" ry="6" fill="#ffa07a"/>

  <!-- Eyes (googly, cartoony) -->
  <ellipse cx="13" cy="15" rx="2.5" ry="3" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <ellipse cx="19" cy="15" rx="2.5" ry="3" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <circle cx="13" cy="16" r="1.5" fill="#000"/>
  <circle cx="19" cy="16" r="1.5" fill="#000"/>

  <!-- Nose -->
  <ellipse cx="16" cy="18" rx="1.5" ry="1" fill="#000"/>

  <!-- Mouth/smile -->
  <path d="M 12 19 Q 16 21, 20 19" fill="none" stroke="#000" stroke-width="0.8"/>

  <!-- Arms (stumpy) -->
  <ellipse cx="8" cy="20" rx="2" ry="3" fill="#ff0000"/>
  <ellipse cx="24" cy="20" rx="2" ry="3" fill="#ff0000"/>

  <!-- Feet -->
  <ellipse cx="12" cy="26" rx="3" ry="2" fill="#ff0000"/>
  <ellipse cx="20" cy="26" rx="3" ry="2" fill="#ff0000"/>

  <!-- "DO U KNOW DA WAE?" text -->
  <text x="16" y="6" font-family="Comic Sans MS, cursive" font-size="3" fill="#fff" text-anchor="middle" font-weight="bold">KNUCKLES</text>
  <text x="16" y="31" font-family="Comic Sans MS, cursive" font-size="2.5" fill="#ffff00" text-anchor="middle" font-weight="bold">DA WAE?</text>

  <!-- Click click tongue sound effect -->
  <text x="4" y="12" font-size="3" fill="#fff" opacity="0.8">*click*</text>
</svg>
