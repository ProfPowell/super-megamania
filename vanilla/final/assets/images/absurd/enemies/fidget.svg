<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- FIDGET SPINNER (Peak 2017 absurdity) -->
  <!-- Center bearing -->
  <circle cx="16" cy="16" r="4" fill="#333" stroke="#000" stroke-width="0.5"/>

  <!-- Three lobes (spinning!) -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
                      from="0 16 16" to="360 16 16" dur="0.5s" repeatCount="indefinite"/>

    <!-- Top lobe -->
    <circle cx="16" cy="6" r="5" fill="#00ffff" stroke="#00aaaa" stroke-width="1"/>
    <circle cx="16" cy="6" r="2" fill="#0088aa"/>

    <!-- Bottom right lobe -->
    <circle cx="25" cy="21" r="5" fill="#ff00ff" stroke="#aa00aa" stroke-width="1"/>
    <circle cx="25" cy="21" r="2" fill="#880088"/>

    <!-- Bottom left lobe -->
    <circle cx="7" cy="21" r="5" fill="#ffff00" stroke="#aaaa00" stroke-width="1"/>
    <circle cx="7" cy="21" r="2" fill="#888800"/>
  </g>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#fff"/>

  <!-- "SPIN" text -->
  <text x="16" y="18" font-family="Arial" font-size="4" fill="#000" text-anchor="middle" font-weight="bold">SPIN</text>
</svg>
