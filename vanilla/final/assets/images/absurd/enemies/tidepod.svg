<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- TIDE POD (Forbidden Snack) -->
  <!-- Pod body -->
  <ellipse cx="16" cy="16" rx="13" ry="11" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <!-- Orange section -->
  <path d="M 16 5 Q 8 10, 10 16 Q 12 22, 16 27 Z" fill="#ff6600" opacity="0.7"/>

  <!-- Blue section -->
  <path d="M 16 5 Q 24 10, 22 16 Q 20 22, 16 27 Z" fill="#0066ff" opacity="0.7"/>

  <!-- Swirl effect -->
  <path d="M 16 8 Q 14 12, 16 16 Q 18 20, 16 24"
        fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>

  <!-- Warning label -->
  <circle cx="16" cy="16" r="6" fill="#ffff00" stroke="#ff0000" stroke-width="2"/>
  <path d="M 16 12 L 16 16 M 16 18 L 16 19" stroke="#ff0000" stroke-width="2" stroke-linecap="round"/>

  <!-- Skull and crossbones (tiny) -->
  <text x="16" y="17" font-family="Arial" font-size="4" fill="#ff0000" text-anchor="middle" font-weight="bold">☠</text>

  <!-- "DO NOT EAT" -->
  <text x="16" y="30" font-family="Arial" font-size="3" fill="#ff0000" text-anchor="middle" font-weight="bold">NO EAT!</text>

  <!-- Shine/gloss -->
  <ellipse cx="12" cy="10" rx="4" ry="3" fill="#fff" opacity="0.4"/>
</svg>
