<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pizza Slice -->
  <!-- Crust -->
  <path d="M 16 2 L 2 28 L 30 28 Z" fill="#f4a460" stroke="#d2691e" stroke-width="1"/>

  <!-- Cheese -->
  <path d="M 16 6 L 6 26 L 26 26 Z" fill="#ffd700"/>

  <!-- Sauce (under cheese, peeking out) -->
  <path d="M 16 8 L 8 25 L 24 25 Z" fill="#dc143c"/>

  <!-- Cheese on top -->
  <path d="M 16 10 L 10 24 L 22 24 Z" fill="#ffeb3b"/>

  <!-- Pepperoni slices -->
  <circle cx="14" cy="16" r="2" fill="#8b0000" stroke="#660000" stroke-width="0.5"/>
  <circle cx="18" cy="18" r="2" fill="#8b0000" stroke="#660000" stroke-width="0.5"/>
  <circle cx="16" cy="21" r="2" fill="#8b0000" stroke="#660000" stroke-width="0.5"/>

  <!-- Cheese bubbles/holes -->
  <circle cx="12" cy="20" r="1" fill="#fff8dc"/>
  <circle cx="20" cy="20" r="0.8" fill="#fff8dc"/>

  <!-- Googly eyes on the pizza -->
  <circle cx="14" cy="14" r="2" fill="white" stroke="black" stroke-width="0.5"/>
  <circle cx="18" cy="14" r="2" fill="white" stroke="black" stroke-width="0.5"/>
  <circle cx="13.5" cy="13.5" r="1" fill="black"/>
  <circle cx="18.5" cy="13.5" r="1" fill="black"/>

  <!-- Happy mouth -->
  <path d="M 13 18 Q 16 20, 19 18" fill="none" stroke="black" stroke-width="1"/>
</svg>
