<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Plunger -->
  <!-- Rubber cup (red) -->
  <ellipse cx="16" cy="10" rx="10" ry="6" fill="#d32f2f" stroke="#b71c1c" stroke-width="1"/>
  <path d="M 6 10 Q 16 16, 26 10" fill="#c62828"/>

  <!-- Wooden handle -->
  <rect x="14.5" y="10" width="3" height="18" fill="#8b4513" stroke="#6d3410" stroke-width="0.5"/>

  <!-- Handle highlight -->
  <rect x="15" y="10" width="1" height="18" fill="#a0682a" opacity="0.5"/>

  <!-- Handle grip -->
  <ellipse cx="16" cy="28" rx="4" ry="2" fill="#6d3410"/>

  <!-- Angry eyes on the cup -->
  <circle cx="12" cy="10" r="2" fill="white"/>
  <circle cx="20" cy="10" r="2" fill="white"/>
  <circle cx="11.5" cy="10" r="1" fill="black"/>
  <circle cx="20.5" cy="10" r="1" fill="black"/>

  <!-- Angry eyebrows -->
  <line x1="10" y1="7" x2="14" y2="8" stroke="black" stroke-width="1"/>
  <line x1="18" y1="8" x2="22" y2="7" stroke="black" stroke-width="1"/>

  <!-- Frown -->
  <path d="M 12 14 Q 16 12, 20 14" fill="none" stroke="black" stroke-width="1"/>
</svg>
