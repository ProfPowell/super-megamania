<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- AMONG US CREWMATE (Sus!) -->
  <!-- Body (backpack shape) -->
  <path d="M 12 10 L 12 24 Q 12 28, 16 28 Q 20 28, 20 24 L 20 10 Q 20 6, 16 6 Q 12 6, 12 10"
        fill="#ff0000" stroke="#aa0000" stroke-width="1"/>

  <!-- Backpack -->
  <rect x="18" y="12" width="4" height="10" rx="2" fill="#aa0000"/>

  <!-- Visor/Goggle -->
  <ellipse cx="16" cy="12" rx="6" ry="4" fill="#88ddff" stroke="#5599cc" stroke-width="1"/>

  <!-- Reflection on visor -->
  <ellipse cx="14" cy="11" rx="2" ry="1.5" fill="#fff" opacity="0.6"/>

  <!-- Legs -->
  <ellipse cx="13" cy="28" rx="2" ry="1.5" fill="#aa0000"/>
  <ellipse cx="19" cy="28" rx="2" ry="1.5" fill="#aa0000"/>

  <!-- "SUS" text -->
  <text x="16" y="22" font-family="Arial" font-size="4" fill="#fff" text-anchor="middle" font-weight="bold">SUS</text>

  <!-- Knife (VERY SUS!) -->
  <g opacity="0.8">
    <rect x="22" y="16" width="6" height="1" fill="#c0c0c0"/>
    <path d="M 28 14 L 30 16.5 L 28 19 Z" fill="#c0c0c0"/>
    <rect x="21" y="15.5" width="2" height="2" fill="#654321"/>

    <!-- Blood drip animation -->
    <circle cx="28" cy="19" r="0.5" fill="#8b0000">
      <animate attributeName="cy" values="19;21;19" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
