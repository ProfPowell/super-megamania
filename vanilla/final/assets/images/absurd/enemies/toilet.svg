<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Toilet Seat -->
  <!-- Outer ring -->
  <ellipse cx="16" cy="16" rx="14" ry="12" fill="white" stroke="#666" stroke-width="1.5"/>

  <!-- Inner hole -->
  <ellipse cx="16" cy="16" rx="9" ry="7" fill="#1a1a1a" stroke="#666" stroke-width="1"/>

  <!-- Hinges -->
  <rect x="10" y="3" width="3" height="4" rx="1" fill="#silver" stroke="#333" stroke-width="0.5"/>
  <rect x="19" y="3" width="3" height="4" rx="1" fill="#silver" stroke="#333" stroke-width="0.5"/>

  <!-- Highlight -->
  <ellipse cx="12" cy="10" rx="3" ry="2" fill="white" opacity="0.4"/>

  <!-- Googly eyes -->
  <circle cx="12" cy="16" r="3" fill="white" stroke="black" stroke-width="0.5"/>
  <circle cx="20" cy="16" r="3" fill="white" stroke="black" stroke-width="0.5"/>
  <circle cx="11.5" cy="15.5" r="1.5" fill="black"/>
  <circle cx="20.5" cy="15.5" r="1.5" fill="black"/>

  <!-- Disgusted mouth -->
  <path d="M 13 22 Q 16 20, 19 22" fill="none" stroke="black" stroke-width="1"/>
</svg>
