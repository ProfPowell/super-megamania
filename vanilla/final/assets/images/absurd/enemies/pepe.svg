<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- PEPE THE FROG -->
  <!-- Head -->
  <ellipse cx="16" cy="18" rx="12" ry="10" fill="#7cb342" stroke="#558b2f" stroke-width="1"/>

  <!-- Eyes (large and expressive) -->
  <ellipse cx="12" cy="16" rx="4" ry="5" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <ellipse cx="20" cy="16" rx="4" ry="5" fill="#fff" stroke="#000" stroke-width="0.5"/>

  <!-- Pupils (looking slightly different directions) -->
  <circle cx="11" cy="17" r="2" fill="#000"/>
  <circle cx="21" cy="17" r="2" fill="#000"/>

  <!-- Under-eye bags (tired pepe) -->
  <ellipse cx="12" cy="20" rx="3" ry="1.5" fill="#689f38" opacity="0.5"/>
  <ellipse cx="20" cy="20" rx="3" ry="1.5" fill="#689f38" opacity="0.5"/>

  <!-- Mouth (neutral/smug expression) -->
  <path d="M 10 22 Q 12 23, 14 22 L 14 24 Q 16 26, 18 24 L 18 22 Q 20 23, 22 22"
        fill="#689f38" stroke="#558b2f" stroke-width="0.8"/>

  <!-- Mouth line -->
  <path d="M 12 24 Q 16 25, 20 24" fill="none" stroke="#000" stroke-width="0.8"/>

  <!-- "FEELS" text -->
  <text x="16" y="8" font-family="Arial" font-size="4" fill="#7cb342" text-anchor="middle" font-weight="bold">FEELS</text>
  <text x="16" y="12" font-family="Arial" font-size="3" fill="#558b2f" text-anchor="middle">GOOD</text>
</svg>
