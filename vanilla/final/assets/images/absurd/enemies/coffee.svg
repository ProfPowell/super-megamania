<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Coffee Cup (developer fuel) -->
  <!-- Cup body -->
  <path d="M 8 10 L 6 26 Q 6 28, 8 28 L 24 28 Q 26 28, 26 26 L 24 10 Z"
        fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>

  <!-- Coffee inside -->
  <ellipse cx="16" cy="11" rx="8" ry="2" fill="#6d4c41"/>
  <path d="M 8.5 11 L 7 24 Q 7 26, 9 26 L 23 26 Q 25 26, 25 24 L 23.5 11"
        fill="#6d4c41"/>

  <!-- Handle -->
  <path d="M 24 14 Q 28 14, 28 18 Q 28 22, 24 22"
        fill="none" stroke="#4caf50" stroke-width="1.5"/>

  <!-- Steam (animated) -->
  <path d="M 12 8 Q 11 6, 12 4" fill="none" stroke="#9e9e9e" stroke-width="1"
        stroke-linecap="round" opacity="0.7">
    <animate attributeName="d"
             values="M 12 8 Q 11 6, 12 4; M 12 8 Q 13 6, 12 4; M 12 8 Q 11 6, 12 4"
             dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 16 8 Q 17 5, 16 2" fill="none" stroke="#9e9e9e" stroke-width="1"
        stroke-linecap="round" opacity="0.7">
    <animate attributeName="d"
             values="M 16 8 Q 17 5, 16 2; M 16 8 Q 15 5, 16 2; M 16 8 Q 17 5, 16 2"
             dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 20 8 Q 19 6, 20 4" fill="none" stroke="#9e9e9e" stroke-width="1"
        stroke-linecap="round" opacity="0.7">
    <animate attributeName="d"
             values="M 20 8 Q 19 6, 20 4; M 20 8 Q 21 6, 20 4; M 20 8 Q 19 6, 20 4"
             dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="1s" repeatCount="indefinite"/>
  </path>

  <!-- Tired face in the coffee -->
  <circle cx="13" cy="18" r="1" fill="#3e2723" opacity="0.6"/>
  <circle cx="19" cy="18" r="1" fill="#3e2723" opacity="0.6"/>
  <path d="M 12 22 Q 16 20, 20 22" fill="none" stroke="#3e2723"
        stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
</svg>
