<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Screaming Emoji Face 😱 -->
  <!-- Face circle (yellow) -->
  <circle cx="16" cy="16" r="14" fill="#ffd700" stroke="#f59e0b" stroke-width="1"/>

  <!-- Eyes (wide open in terror) -->
  <ellipse cx="11" cy="13" rx="3" ry="4" fill="#2d3748"/>
  <ellipse cx="21" cy="13" rx="3" ry="4" fill="#2d3748"/>

  <!-- White of eyes (terrified look) -->
  <ellipse cx="11" cy="12" rx="2" ry="3" fill="white"/>
  <ellipse cx="21" cy="12" rx="2" ry="3" fill="white"/>

  <!-- Pupils (looking slightly different directions for chaos) -->
  <circle cx="10.5" cy="12" r="1.2" fill="black"/>
  <circle cx="21.5" cy="12" r="1.2" fill="black"/>

  <!-- Screaming mouth (open O) -->
  <ellipse cx="16" cy="20" rx="4" ry="5" fill="#2d3748"/>
  <ellipse cx="16" cy="19" rx="3" ry="4" fill="#ef4444"/>

  <!-- Hands on face (classic emoji style) -->
  <path d="M 3 18 Q 2 16, 4 14 L 6 16 Q 5 18, 3 19" fill="#ffd700" stroke="#f59e0b" stroke-width="0.5"/>
  <path d="M 29 18 Q 30 16, 28 14 L 26 16 Q 27 18, 29 19" fill="#ffd700" stroke="#f59e0b" stroke-width="0.5"/>

  <!-- Vibration lines for extra panic -->
  <line x1="2" y1="8" x2="4" y2="6" stroke="#f59e0b" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="0.2s" repeatCount="indefinite"/>
  </line>
  <line x1="30" y1="8" x2="28" y2="6" stroke="#f59e0b" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="0.2s" repeatCount="indefinite"/>
  </line>
  <line x1="2" y1="24" x2="4" y2="26" stroke="#f59e0b" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="0.2s" repeatCount="indefinite"/>
  </line>
  <line x1="30" y1="24" x2="28" y2="26" stroke="#f59e0b" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="0.2s" repeatCount="indefinite"/>
  </line>
</svg>
