<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Nyan Cat (simplified) -->
  <!-- Rainbow trail -->
  <rect x="0" y="10" width="10" height="2" fill="#ff0000"/>
  <rect x="0" y="12" width="10" height="2" fill="#ff8000"/>
  <rect x="0" y="14" width="10" height="2" fill="#ffff00"/>
  <rect x="0" y="16" width="10" height="2" fill="#00ff00"/>
  <rect x="0" y="18" width="10" height="2" fill="#0080ff"/>
  <rect x="0" y="20" width="10" height="2" fill="#8000ff"/>

  <!-- Pop tart body -->
  <rect x="10" y="12" width="12" height="10" rx="1" fill="#ffb6c1" stroke="#ff69b4" stroke-width="1"/>

  <!-- Frosting -->
  <rect x="11" y="13" width="10" height="2" fill="#ff69b4"/>

  <!-- Sprinkles -->
  <circle cx="13" cy="17" r="0.5" fill="#ff0000"/>
  <circle cx="15" cy="16" r="0.5" fill="#00ff00"/>
  <circle cx="17" cy="18" r="0.5" fill="#0000ff"/>
  <circle cx="19" cy="17" r="0.5" fill="#ffff00"/>

  <!-- Cat head -->
  <ellipse cx="24" cy="15" rx="5" ry="4" fill="#999" stroke="#666" stroke-width="0.5"/>

  <!-- Ears -->
  <path d="M 21 12 L 22 10 L 23 12 Z" fill="#999" stroke="#666" stroke-width="0.5"/>
  <path d="M 25 12 L 26 10 L 27 12 Z" fill="#999" stroke="#666" stroke-width="0.5"/>

  <!-- Eyes -->
  <circle cx="22" cy="15" r="1.5" fill="black"/>
  <circle cx="26" cy="15" r="1.5" fill="black"/>

  <!-- Mouth -->
  <path d="M 23 16 Q 24 17, 25 16" fill="none" stroke="black" stroke-width="0.5"/>

  <!-- Paws -->
  <circle cx="12" cy="22" r="1.5" fill="#999"/>
  <circle cx="20" cy="22" r="1.5" fill="#999"/>

  <!-- Tail -->
  <path d="M 10 16 Q 6 14, 8 12" fill="none" stroke="#999" stroke-width="1.5"/>
</svg>
