<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Bitcoin Logo (parody) -->
  <!-- Circle -->
  <circle cx="16" cy="16" r="14" fill="#f7931a" stroke="#d87315" stroke-width="2"/>

  <!-- B symbol -->
  <path d="M 12 8 L 12 24 M 12 8 L 18 8 Q 22 10, 22 13 Q 22 15, 19 16 M 12 16 L 19 16 Q 23 17, 23 20 Q 23 23, 19 24 L 12 24"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top and bottom lines through B -->
  <line x1="14" y1="6" x2="14" y2="9" stroke="white" stroke-width="2"/>
  <line x1="18" y1="6" x2="18" y2="9" stroke="white" stroke-width="2"/>
  <line x1="14" y1="23" x2="14" y2="26" stroke="white" stroke-width="2"/>
  <line x1="18" y1="23" x2="18" y2="26" stroke="white" stroke-width="2"/>

  <!-- "To the moon!" rocket -->
  <path d="M 26 8 L 28 6 L 30 8 L 28 10 Z" fill="#ff4500" opacity="0.8">
    <animate attributeName="transform" type="translate"
             values="0,0; -2,-2; 0,0" dur="0.5s" repeatCount="indefinite"/>
  </path>
</svg>
