<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- RICK ASTLEY / RICKROLL -->
  <!-- Head -->
  <ellipse cx="16" cy="16" rx="10" ry="12" fill="#f4c2a0" stroke="#000" stroke-width="0.5"/>

  <!-- Iconic hair (swoosh) -->
  <path d="M 6 10 Q 10 4, 16 6 Q 22 4, 26 10" fill="#8b4513" stroke="#654321" stroke-width="0.5"/>
  <path d="M 8 10 Q 12 6, 16 8" fill="#a0682a" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="12" cy="14" r="1.5" fill="#000"/>
  <circle cx="20" cy="14" r="1.5" fill="#000"/>

  <!-- Eyebrows (expressive) -->
  <path d="M 10 12 L 14 11" stroke="#654321" stroke-width="1" stroke-linecap="round"/>
  <path d="M 18 11 L 22 12" stroke="#654321" stroke-width="1" stroke-linecap="round"/>

  <!-- Big smile -->
  <path d="M 10 18 Q 16 22, 22 18" fill="none" stroke="#000" stroke-width="1"/>
  <path d="M 10 18 Q 16 21, 22 18" fill="#fff"/>

  <!-- Teeth -->
  <line x1="13" y1="19" x2="13" y2="20" stroke="#000" stroke-width="0.5"/>
  <line x1="16" y1="19" x2="16" y2="20" stroke="#000" stroke-width="0.5"/>
  <line x1="19" y1="19" x2="19" y2="20" stroke="#000" stroke-width="0.5"/>

  <!-- Microphone -->
  <ellipse cx="8" cy="24" rx="2" ry="3" fill="#c0c0c0" stroke="#808080" stroke-width="0.5"/>
  <rect x="7" y="27" width="2" height="4" fill="#404040"/>

  <!-- "NEVER GONNA" text -->
  <text x="16" y="30" font-family="Arial" font-size="3" fill="#ff0000" text-anchor="middle" font-weight="bold">RICKROLL</text>

  <!-- Music notes -->
  <text x="26" y="10" font-size="6" fill="#000">♪</text>
  <text x="4" y="22" font-size="5" fill="#000">♫</text>
</svg>
