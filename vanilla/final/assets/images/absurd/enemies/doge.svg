<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Doge Meme (Shiba Inu) -->
  <!-- Dog head -->
  <ellipse cx="16" cy="18" rx="11" ry="10" fill="#d4a373" stroke="#8b6f47" stroke-width="1"/>

  <!-- Ears -->
  <ellipse cx="9" cy="10" rx="3" ry="6" fill="#d4a373" stroke="#8b6f47" stroke-width="0.5"/>
  <ellipse cx="23" cy="10" rx="3" ry="6" fill="#d4a373" stroke="#8b6f47" stroke-width="0.5"/>

  <!-- Inner ears (pink) -->
  <ellipse cx="9" cy="10" rx="1.5" ry="4" fill="#ffb6c1"/>
  <ellipse cx="23" cy="10" rx="1.5" ry="4" fill="#ffb6c1"/>

  <!-- Eyes -->
  <circle cx="12" cy="16" r="2.5" fill="black"/>
  <circle cx="20" cy="16" r="2.5" fill="black"/>

  <!-- Eye shine -->
  <circle cx="11.5" cy="15.5" r="0.8" fill="white"/>
  <circle cx="19.5" cy="15.5" r="0.8" fill="white"/>

  <!-- Snout -->
  <ellipse cx="16" cy="21" rx="5" ry="4" fill="#e8c9a0"/>

  <!-- Nose -->
  <ellipse cx="16" cy="20" rx="2" ry="1.5" fill="#333"/>

  <!-- Mouth -->
  <path d="M 16 20 L 16 23" stroke="#333" stroke-width="0.8"/>
  <path d="M 12 23 Q 16 25, 20 23" fill="none" stroke="#333" stroke-width="0.8"/>

  <!-- "wow" text -->
  <text x="4" y="8" font-family="Comic Sans MS, cursive" font-size="5" fill="#ff1493" font-weight="bold">wow</text>
  <text x="22" y="26" font-family="Comic Sans MS, cursive" font-size="4" fill="#00ffff" font-weight="bold">such</text>
  <text x="2" y="28" font-family="Comic Sans MS, cursive" font-size="4" fill="#ffff00" font-weight="bold">amaze</text>
</svg>
