<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- DISTRACTED BOYFRIEND MEME (simplified) -->
  <!-- Girlfriend (left, upset) -->
  <g>
    <circle cx="6" cy="12" r="3" fill="#f4c2a0"/>
    <rect x="4" y="15" width="4" height="8" fill="#ff69b4"/>
    <!-- Angry eyebrows -->
    <line x1="5" y1="11" x2="6" y2="12" stroke="#000" stroke-width="0.5"/>
    <line x1="7" y1="12" x2="8" y2="11" stroke="#000" stroke-width="0.5"/>
    <!-- Mouth (frown) -->
    <path d="M 5 13 Q 6 12.5, 7 13" fill="none" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Boyfriend (center, looking away) -->
  <g>
    <circle cx="16" cy="14" r="3.5" fill="#f4c2a0"/>
    <rect x="14" y="17" width="4" height="9" fill="#0066cc"/>
    <!-- Eyes looking right -->
    <circle cx="17" cy="14" r="0.8" fill="#000"/>
    <circle cx="15" cy="14" r="0.8" fill="#000"/>
    <!-- Smile -->
    <path d="M 14 16 Q 16 17, 18 16" fill="none" stroke="#000" stroke-width="0.5"/>
    <!-- Arm pointing -->
    <line x1="18" y1="20" x2="24" y2="16" stroke="#f4c2a0" stroke-width="2"/>
  </g>

  <!-- Girl walking by (right, attractive) -->
  <g>
    <circle cx="26" cy="12" r="3" fill="#f4c2a0"/>
    <rect x="24" y="15" width="4" height="8" fill="#ff0000"/>
    <!-- Flirty eyes -->
    <circle cx="25" cy="12" r="0.8" fill="#000"/>
    <circle cx="27" cy="12" r="0.8" fill="#000"/>
    <!-- Hearts -->
    <text x="28" y="10" font-size="4" fill="#ff69b4">♥</text>
    <!-- Smile -->
    <path d="M 25 13 Q 26 14, 27 13" fill="none" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Labels -->
  <text x="6" y="28" font-family="Arial" font-size="3" fill="#666" text-anchor="middle">GF</text>
  <text x="16" y="30" font-family="Arial" font-size="3" fill="#666" text-anchor="middle">BF</text>
  <text x="26" y="28" font-family="Arial" font-size="3" fill="#666" text-anchor="middle">NEW</text>

  <!-- "MEME" text -->
  <text x="16" y="4" font-family="Arial" font-size="3" fill="#000" text-anchor="middle" font-weight="bold">DISTRACTED</text>
</svg>
