<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Angry AI Robot Face -->
  <!-- Robot head -->
  <rect x="4" y="6" width="24" height="20" rx="2" fill="#4a5568" stroke="#2d3748" stroke-width="1"/>

  <!-- Antenna -->
  <line x1="16" y1="6" x2="16" y2="2" stroke="#2d3748" stroke-width="2"/>
  <circle cx="16" cy="2" r="2" fill="#f56565"/>

  <!-- Angry LED eyes -->
  <rect x="8" y="12" width="6" height="4" rx="1" fill="#f56565" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="18" y="12" width="6" height="4" rx="1" fill="#f56565" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Angry eyebrows (circuit board style) -->
  <line x1="7" y1="11" x2="14" y2="11" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="18" y1="11" x2="25" y2="11" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Angry mouth (speaker grille) -->
  <rect x="10" y="20" width="12" height="4" rx="1" fill="#2d3748"/>
  <line x1="11" y1="21" x2="11" y2="23" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="13" y1="21" x2="13" y2="23" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="15" y1="21" x2="15" y2="23" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="17" y1="21" x2="17" y2="23" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="19" y1="21" x2="19" y2="23" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="21" y1="21" x2="21" y2="23" stroke="#4a5568" stroke-width="0.5"/>

  <!-- Circuit lines for AI vibes -->
  <path d="M 4 14 L 2 14 L 2 18 L 4 18" fill="none" stroke="#48bb78" stroke-width="1"/>
  <path d="M 28 14 L 30 14 L 30 18 L 28 18" fill="none" stroke="#48bb78" stroke-width="1"/>
</svg>
