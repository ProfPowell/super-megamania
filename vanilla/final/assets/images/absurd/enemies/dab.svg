<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- DABBING EMOJI -->
  <!-- Face -->
  <circle cx="16" cy="16" r="14" fill="#ffd700" stroke="#f59e0b" stroke-width="1"/>

  <!-- Dabbing pose - one arm up, one arm extended -->
  <!-- Left arm (up) -->
  <rect x="4" y="18" width="8" height="3" fill="#ffd700" stroke="#f59e0b" stroke-width="0.5"
        transform="rotate(-45 8 19.5)"/>

  <!-- Right arm (extended) -->
  <rect x="20" y="16" width="10" height="3" fill="#ffd700" stroke="#f59e0b" stroke-width="0.5"
        transform="rotate(20 25 17.5)"/>

  <!-- Eyes (both on right side for dab pose) -->
  <circle cx="20" cy="12" r="2" fill="#000"/>
  <circle cx="24" cy="12" r="2" fill="#000"/>

  <!-- Cool sunglasses -->
  <rect x="18" y="11" width="8" height="3" rx="1" fill="#000"/>
  <rect x="14" y="12" width="3" height="1" fill="#000"/>

  <!-- Tongue out (cheeky) -->
  <ellipse cx="22" cy="18" rx="2" ry="1.5" fill="#ff69b4"/>

  <!-- "DAB" text -->
  <text x="6" y="8" font-family="Arial" font-size="5" fill="#fff" font-weight="bold">DAB</text>
</svg>
