<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dancing Hot Dog - Player Ship -->
  <!-- Bun bottom -->
  <ellipse cx="16" cy="24" rx="14" ry="6" fill="#d4a574" stroke="#8b6f47" stroke-width="0.5"/>

  <!-- Hot dog -->
  <ellipse cx="16" cy="20" rx="12" ry="5" fill="#dc5539" stroke="#a83c27" stroke-width="0.5"/>

  <!-- Mustard squiggle -->
  <path d="M 6 19 Q 10 17, 14 19 T 22 19 T 26 19"
        fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bun top -->
  <ellipse cx="16" cy="16" rx="14" ry="6" fill="#d4a574" stroke="#8b6f47" stroke-width="0.5"/>

  <!-- Eyes (googly eyes for extra absurdity) -->
  <circle cx="12" cy="16" r="3" fill="white" stroke="black" stroke-width="0.5"/>
  <circle cx="20" cy="16" r="3" fill="white" stroke="black" stroke-width="0.5"/>
  <circle cx="11.5" cy="15.5" r="1.5" fill="black"/>
  <circle cx="20.5" cy="15.5" r="1.5" fill="black"/>

  <!-- Smile -->
  <path d="M 10 20 Q 16 23, 22 20" fill="none" stroke="black" stroke-width="1" stroke-linecap="round"/>

  <!-- Little arms waving (for dancing effect) -->
  <line x1="4" y1="18" x2="2" y2="14" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="18" x2="30" y2="14" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
</svg>
