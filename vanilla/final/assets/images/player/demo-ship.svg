<svg width="32" height="24" xmlns="http://www.w3.org/2000/svg">
  <!-- Demo player ship - green triangle with blue accents -->
  <defs>
    <linearGradient id="shipGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aa00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main body -->
  <polygon points="16,2 4,22 28,22" fill="url(#shipGradient)" stroke="#fff" stroke-width="1"/>

  <!-- Cockpit -->
  <circle cx="16" cy="12" r="3" fill="#00ffff"/>

  <!-- Engine exhausts -->
  <rect x="6" y="20" width="3" height="2" fill="#ff6600"/>
  <rect x="23" y="20" width="3" height="2" fill="#ff6600"/>
</svg>
