name: Test & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  deploy:
    # Deploy only on pushes to main; PRs just run the tests.
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Auto-enables GitHub Pages (source: GitHub Actions) on first run.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # The game is a no-build static site; publish it as the site root.
          path: vanilla/final
      - id: deployment
        uses: actions/deploy-pages@v4
